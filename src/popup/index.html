<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fetcho</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="popup">
    <header>
      <div class="header-row">
        <h1>Fetcho</h1>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark mode" role="switch" aria-checked="false">
          <svg class="theme-icon sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="theme-icon moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://..." autocomplete="off" />
        <button id="paste-btn" class="paste-btn" title="Paste from clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          </svg>
        </button>
      </div>

      <div class="tip-row">
        <span id="tip-text" class="tip">Paste a video link to get started</span>
        <div id="detected-section" class="hidden">
          <span id="platform-badge" class="badge"></span>
        </div>
      </div>

      <div class="actions">
        <button id="download-btn" class="btn btn-primary">Download</button>
      </div>
    </main>

    <footer>
      <div class="footer-row">
        <a id="github-link" href="https://github.com/nightrunner91/fetcho" target="_blank" rel="noopener">GitHub</a>
        <span id="version"></span>
      </div>
    </footer>
  </div>

  <script type="module" src="index.ts"></script>
</body>

</html>
